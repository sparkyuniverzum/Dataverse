name: dataverse-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataverse
          POSTGRES_PASSWORD: dataverse
          POSTGRES_DB: dataverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataverse -d dataverse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://dataverse:dataverse@127.0.0.1:5432/dataverse
      DATAVERSE_API_BASE: http://127.0.0.1:8000
      DATAVERSE_JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Backend unit tests
        run: pytest -q tests/test_parser_service.py tests/test_calc_service.py

      - name: Parser2 spec contract tests
        run: |
          pytest -q tests/test_parser2_spec_contract.py tests/test_parser2_lexer.py tests/test_parser2_ast.py tests/test_parser2_planner.py tests/test_parser2_resolver.py

      - name: Start API
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          ./scripts/wait_for_http.sh http://127.0.0.1:8000/openapi.json 60

      - name: Backend integration smoke
        run: |
          pytest -q tests/test_api_integration.py -k "snapshot_v1_contract or tables_v1_contract or task_executor_rolls_back_on_failed_link or execute_tasks_rollback_after_partial_write or guardian_command_is_idempotent_for_same_rule"

      - name: Parser2 release gate integration tests
        run: |
          pytest -q tests/test_api_integration.py -k "parser_v2_contract_gate or parser_v2_legacy_ or parser_v2_resolves_existing_names_to_ids_without_ingest or parser_v2_returns_bridge_error_for_mixed_id_and_name_selectors"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build
