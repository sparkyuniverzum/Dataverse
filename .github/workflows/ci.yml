name: dataverse-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataverse
          POSTGRES_PASSWORD: dataverse
          POSTGRES_DB: dataverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dataverse -d dataverse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://dataverse:dataverse@127.0.0.1:5432/dataverse
      DATAVERSE_API_BASE: http://127.0.0.1:8000
      DATAVERSE_JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Backend unit tests
        run: pytest -q tests/test_parser_service.py tests/test_calc_service.py

      - name: Star contract baseline parity (backend)
        run: pytest -q tests/test_star_contract_baseline.py

      - name: API v1 OpenAPI freeze gate (backend)
        run: pytest -q tests/test_api_v1_openapi_freeze.py

      - name: Galaxy workspace contract baseline parity (backend)
        run: pytest -q tests/test_galaxy_workspace_contract_baseline.py

      - name: Moon contract baseline parity (backend)
        run: pytest -q tests/test_moon_contract_baseline.py

      - name: Moon contract freeze gate (backend)
        run: pytest -q tests/test_moon_contract_freeze_gate.py

      - name: Civilization contract baseline parity (backend)
        run: pytest -q tests/test_civilization_contract_baseline.py

      - name: Mineral contract baseline parity (backend)
        run: pytest -q tests/test_mineral_contract_baseline.py

      - name: Semantic constitution contract gate (backend)
        run: pytest -q tests/test_semantic_constitution_contract.py

      - name: Parser2 spec contract tests
        run: |
          pytest -q tests/test_parser2_spec_contract.py tests/test_parser2_lexer.py tests/test_parser2_ast.py tests/test_parser2_planner.py tests/test_parser2_resolver.py

      - name: Start API
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          ./scripts/wait_for_http.sh http://127.0.0.1:8000/openapi.json 60

      - name: Backend integration smoke
        run: |
          pytest -q tests/test_api_integration.py -k "auth_session_lifecycle_login_refresh_logout_and_me or moon_first_class_crud_endpoints or civilization_contract_gate_create_mutate_extinguish_and_converge or mineral_contract_gate_typing_validation_and_facts_projection or star_core_endpoint_by_endpoint_closure_v2 or snapshot_v1_contract or tables_v1_contract or task_executor_rolls_back_on_failed_link or execute_tasks_rollback_after_partial_write or guardian_command_is_idempotent_for_same_rule or mutate_asteroid_occ_parallel_writes_allow_single_winner or link_parallel_same_relation_returns_single_bond or bond_mutate_replaces_type_and_preserves_single_active_edge or bond_extinguish_soft_deletes_link"

      - name: Release gate: star lock -> first planet -> grid convergence
        run: |
          pytest -q tests/test_api_integration.py -k "release_gate_star_lock_first_planet_grid_convergence"

      - name: Semantic constitution endpoint closure (backend)
        run: |
          pytest -q tests/test_api_integration.py -k "semantic_constitution_endpoint_by_endpoint_closure_v1"

      - name: Star integration freeze gates (backend)
        run: |
          pytest -q tests/test_star_core_integration_freeze.py

      - name: Parser2 release gate integration tests
        run: |
          pytest -q tests/test_api_integration.py -k "parser_v2_contract_gate or parser_v2_legacy_ or parser_v2_resolves_existing_names_to_ids_without_ingest or parser_v2_returns_bridge_error_for_mixed_id_and_name_selectors"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Star contract baseline parity (frontend)
        run: npm test -- --run src/components/universe/starContract.test.js

      - name: Semantic constitution freeze gate (frontend)
        run: npm test -- --run src/lib/semanticConstitutionContract.test.js src/lib/builderParserCommand.test.js src/lib/dataverseApi.test.js

      - name: API v1 OpenAPI freeze gate (frontend)
        run: npm test -- --run src/lib/apiV1Contract.test.js src/lib/dataverseApi.test.js

      - name: Table contract freeze gate (frontend)
        run: npm test -- --run src/lib/tableContract.test.js src/components/universe/workspaceContract.test.js src/components/universe/workspaceFormatters.test.js

      - name: Parser v1/v2 freeze gate (frontend)
        run: npm test -- --run src/lib/parserContract.test.js src/lib/builderParserCommand.test.js src/lib/parserExecutionMode.test.js src/lib/dataverseApi.test.js

      - name: Projection convergence gate (frontend)
        run: npm test -- --run src/components/universe/projectionConvergenceGate.test.js src/components/universe/runtimeSyncUtils.test.js src/lib/hierarchy_layout.test.js

      - name: Moon contract freeze gate (frontend)
        run: npm test -- --run src/lib/moonContract.test.js src/lib/dataverseApi.test.js

      - name: Frontend build
        run: npm run build
