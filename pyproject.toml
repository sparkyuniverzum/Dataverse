[tool.ruff]
line-length = 120
target-version = "py312"
src = ["app", "tests", "scripts"]
extend-exclude = [
  "frontend",
  "alembic/versions",
  "dist",
  "node_modules",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "I",   # import sorting
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
]
ignore = [
  "B008", # FastAPI dependency injection uses call expressions in defaults (Depends/Query/Body).
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]
combine-as-imports = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 120
